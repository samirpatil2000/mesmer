  <!-- Waveform: single continuous path, asymmetric peaks, human feel -->
  <path d="M228,190&#10;       C234,190 237,158 244,158 C251,158 254,222 261,222&#10;       C268,222 271,148 282,148 C293,148 296,232 307,232&#10;       C315,232 318,138 332,138 C346,138 349,232 357,232&#10;       C368,232 371,148 379,148 C390,148 393,222 399,222&#10;       C406,222 409,158 416,158 C423,158 426,190 432,190" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
